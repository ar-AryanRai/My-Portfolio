<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Me</title>
  <link rel="stylesheet" href="./styling/contact.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#D2B1C2] relative">

  <!--  Navigation bar -->
  <nav class="absolute right-0 w-[75%] flex justify-between items-center pl-[100px] pr-[40px] h-[10%]">

    <!-- nav options -->
    <div class="left flex justify-evenly items-center w-[70%] text-white">
      <div class="rest-opt home">Home</div>
      <div class="rest-opt about">About me</div>
      <div class="logo text-3xl text-red-400 font-semibold">Aryan.R</div>
      <div class="rest-opt skills">Skills</div>
      <div class="rest-opt projects">Projects</div>
    </div>

    <!-- hire me button -->
    <div
      class="contact right bg-red-400 text-white px-6 py-2 rounded-3xl font-semibold cursor-pointer active:scale-90 opacity-0 hover:bg-red-600">
      Hire me
    </div>
  </nav>

  <div class="pt-2 w-[100%] h-[100%]">
    <div class="container mt-[150px] w-[100%] px-[10%] h-[60%]">
      <div class="top-side w-[100%] h-[20%]">
        <h1 class="text-center text-4xl mb-4 font-bold">
          Contact Me
        </h1>
        <p class="text-center text-lg">
          Feel free to connect with me using the following handles. I'll get back to you as soon as possible!
        </p>
      </div>

      <div class="bottom flex h-[100%]">
        <div class="left-side pl-[7%] w-[50%]">
          <img class="w-[450px]" src="./images/contact.png" alt="">
        </div>

        <div class="right-side w-[40%] h-[100%] py-20">
          <div class="handles flex flex-wrap h-[100%] py-8 items-evenly justify-evenly gap-10">

            <a href="https://www.linkedin.com/in/aryanrai823/" target="_blank">
              <div
                class="ln active:scale-90 text-center font-semibold py-4 px-16 rounded-3xl text-white text-white bg-[#7B587B] hover:bg-red-400">
                Linked In </div>
            </a>

            <a href="https://wa.me/919205230110" target="_blank">
              <div
                class="ln active:scale-90 text-center font-semibold py-4 px-16 rounded-3xl text-white bg-[#7B587B] hover:bg-red-400">
                Whatsapp</div>
            </a>

            <a href="mailto:example@email.com">
              <div
                class="ln active:scale-90  text-center font-semibold py-4 px-16 rounded-3xl text-white bg-[#7B587B] hover:bg-red-400">
                E-mail</div>
            </a>

            <a href="tel:+919876543210">
              <div
                class="insta text-center font-semibold px-16 py-4 rounded-3xl text-white active:scale-90 bg-[#7B587B] hover:bg-red-400">
                Call me</div>
            </a>
          </div>

          <div class="direct">

          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="./nav.js"></script>
  <script src="./navAnimation.js"></script>
  <script src="./contact.js"></script>
</body>

</html>
