<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="./styling/project.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="relative bg-[#EAEAEA]">

  <!--  Navigation bar -->
  <nav class="absolute top-0 right-0 w-[75%] flex justify-between items-center pl-[100px] pr-[40px] h-[10%]">

    <!-- nav options -->
    <div class="left flex justify-evenly items-center w-[70%] text-gray-400">
      <div class="rest-opt home">Home</div>
      <div class="rest-opt about">About me</div>
      <div class="logo text-3xl text-red-400 font-semibold">Aryan.R</div>
      <div class="rest-opt skills">Skills</div>
      <div class="current projects">Projects</div>
    </div>

    <!-- hire me button -->
    <div
      class="contact right bg-red-400 text-white px-6 py-2 rounded-3xl font-semibold cursor-pointer active:scale-90 opacity-0 hover:bg-red-600">
      Hire me
    </div>
  </nav>

  <div class="blob absolute"></div>

  <div class="swiper-container">
    <div class="swiper-wrapper">
      <div class="swiper-slide"><img class="wizardZ" src="./images/projects/project1.png" alt="Project 1"></div>
      <div class="swiper-slide"><img class="space" src="./images/projects/project2.png" alt="Project 2"></div>
      <div class="swiper-slide"><img class="ems" src="./images/projects/project3.png" alt="Project 3"></div>
      <div class="swiper-slide"><img class="cart" src="./images/projects/project4.png" alt="Project 4"></div>
      <div class="swiper-slide"><img class="sorting" src="./images/projects/project5.png" alt="Project 5"></div>
    </div>

    <!-- Navigation buttons -->
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>

    <!-- Pagination -->
    <div class="swiper-pagination"></div>
  </div>

  <div class="btns flex absolute bottom-16 gap-10">
    <button class="contact-me blob-button  bottom-16">Get connected</button>
    <button class="other-projects blob-button bottom-16" onclick="() =>{
      window.location.href = `https://github.com/ar-AryanRai?tab=repositories`;
    }">More Projects</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="./carousel.js"></script>
  <script src="./nav.js"></script>
  <script src="./navAnimation.js"></script>
  <script src="./projects.js"></script>
  <script src="./projectsNavigation.js"></script>
</body>

</html>
